<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Yönetim Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-custom { background: linear-gradient(45deg, #007bff, #6610f2); border: none; color: white; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4 text-center">
                <div class="card p-4">
                    <h2 class="mb-4">QR Üretici</h2>
                    <p class="text-muted">Kaç adet QR kod oluşturmak istiyorsunuz?</p>
                    
                    <form action="/generate" method="POST">
                        <input type="number" name="adet" class="form-control form-control-lg mb-3 text-center" value="5" min="1" max="100">
                        <button type="submit" class="btn btn-custom btn-lg w-100">Oluştur ve İndir (.zip)</button>
                    </form>
                    
                    <hr>
                    <a href="/logout" class="btn btn-link text-danger">Güvenli Çıkış</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
