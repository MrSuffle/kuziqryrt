<form method="POST">
    <h2>Yönetici Girişi</h2>
    <input type="password" 
           name="password" 
           inputmode="numeric" 
           pattern="[0-9]*" 
           placeholder="4 Haneli Şifre" 
           style="padding:10px; font-size:20px; text-align:center;">
    <br><br>
    <button type="submit" style="padding:10px 20px;">Giriş Yap</button>
</form>
